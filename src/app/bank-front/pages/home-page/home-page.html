<div class="container">
  <header class="main-header">
    <div class="logo"><span class="icon-logo"></span> BANCO</div>
  </header>

  <main class="main-container">
    @if(productResource.isLoading()){
      <p>Cargando productos...</p>
    }

    @if(!productResource.isLoading()){
      <product-table [products]="productResource.value()!" />
    }

    @if (productResource.error()) {
      <p>Estado de error..</p>
    }
  </main>

  <footer>
    <app-footer />
  </footer>
</div>
