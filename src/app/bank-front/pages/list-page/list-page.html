<div class="list-container">
  @if (productResource.isLoading()) {
    <p>Cargando productos...</p>
  }

  @if (productResource.value(); as products) {
    <product-table [products]="products" (deleteProduct)="deleteProduct($event)" />
  }

  @if (productResource.error()) {
    <p>Estado de error..</p>
  }
</div>
