<div class="list-container">
  @if (productResource.isLoading()) {
    <p>Cargando productos...</p>
  }

  @if (!productResource.isLoading()) {
    <product-table [products]="productResource.value()!" (deleteProduct)="deleteProduct($event)" />
  }

  @if (productResource.error()) {
    <p>Estado de error..</p>
  }
</div>
